<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - UJIJI PHARMACY CITY</title>
</head>
<body style="background: #f0f2f5;">
    <header>
        <div class="logo-area"><img src="Nondo.jpg" alt="Logo"><h1>UJIJI PHARMACY</h1></div>
       
    </header>
    <link rel="stylesheet" href="stylee.css">
    <div class="main">
        <div class="stats">
            <div class="card"><h3>Total Meds</h3><p id="medCount">Loading...</p></div>
            <div class="card"><h3>Today's Sales</h3><p>250,000/=</p></div>
            <div class="card"><h3>Urgent Stock</h3><p>5 Items</p></div>
        </div>
        <table>
            <thead><tr><th>Medicine</th><th>In Stock</th><th>Status</th></tr></thead>
            <tbody>
                <tr><td>Panadol</td><td>120</td><td style="color: green;">In Stock</td></tr>
                <tr><td>Azithromycin</td><td>15</td><td style="color: red;">Low Stock</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        document.getElementById('medCount').innerText = "450 Items";
    </script>
</body>
</html>
