<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - UJIJI PHARMACY CITY</title>
</head>
<body style="background: #f0f2f5;">
    <header>
        <link rel="stylesheet" href="stylee.css">
        <div class="logo-area">
            <img src="Nondo.jpg" alt="Logo">
            <h1>UJIJI PHARMACY</h1></div>
    </header>
    <div class="contact-container">
        <h2>Talk to Us</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <textarea id="message" rows="5" placeholder="Your Message" required>
            </textarea>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            alert("Hello " + name + ", your message has been sent successfully!");
            this.reset();
        });
    </script>
</body>
</html>
